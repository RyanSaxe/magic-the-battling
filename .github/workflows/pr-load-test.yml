name: PR Load Test

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-load-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  perf-matrix:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      BURST_JSON_PATH: /tmp/mtb-pr-load-burst.json
      HOT_JSON_PATH: /tmp/mtb-pr-load-hot.json
      MTB_AUTH_SECRET_KEY: ci-load-test-secret-key-not-for-production
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run burst sweep
        run: |
          uv run python -m server.perf.load_harness \
            --db-copy \
            --mock-cube-data \
            --sweep 10,50,100,200 \
            --puppet-count 3 \
            --disable-caps \
            --fresh-server-per-sweep \
            --no-runtime-reset-between-sweeps \
            --game-timeout-sec 900 \
            --json-output "${BURST_JSON_PATH}"

      - name: Run hot residency sweep
        run: |
          uv run python -m server.perf.load_harness \
            --db-copy \
            --mock-cube-data \
            --games 50 \
            --concurrency 50 \
            --hot-sweep 0,100,250,500 \
            --puppet-count 3 \
            --disable-caps \
            --fresh-server-per-sweep \
            --no-runtime-reset-between-sweeps \
            --game-timeout-sec 900 \
            --json-output "${HOT_JSON_PATH}"

      - name: Validate completion is 100%
        id: validate
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import sys

          report_specs = [
            ("burst", pathlib.Path(os.environ["BURST_JSON_PATH"])),
            ("hot", pathlib.Path(os.environ["HOT_JSON_PATH"])),
          ]

          lines = []
          failed = False
          for label, path in report_specs:
            if not path.exists():
              print(f"Missing {label} report: {path}", file=sys.stderr)
              sys.exit(1)

            report = json.loads(path.read_text())
            sweeps = report.get("sweeps", [])
            if not sweeps:
              print(f"No sweeps found in {label} report.", file=sys.stderr)
              sys.exit(1)

            lines.append(f"{label}:")
            for sweep in sweeps:
              games = int(sweep.get("games", 0))
              completed = int(sweep.get("completed", 0))
              failed_count = int(sweep.get("failed", 0))
              idle_hot_games = int(sweep.get("idle_hot_games", 0))
              pct = (completed / games * 100.0) if games else 0.0
              descriptor = f"games={games}"
              if idle_hot_games:
                descriptor += f", idle_hot={idle_hot_games}"
              lines.append(
                f"- {descriptor}: completed={completed}, failed={failed_count}, completion={pct:.2f}%"
              )
              if completed != games or failed_count != 0:
                failed = True

          summary = "\n".join(lines)
          pathlib.Path("/tmp/load-summary.txt").write_text(summary + "\n")
          print(summary)
          if failed:
            sys.exit(1)
          PY

      - name: Build PR comment body
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib

          burst_path = pathlib.Path(os.environ["BURST_JSON_PATH"])
          hot_path = pathlib.Path(os.environ["HOT_JSON_PATH"])
          if not burst_path.exists() or not hot_path.exists():
            pathlib.Path("/tmp/pr-load-comment.md").write_text(
              "## PR Load Test\n\nLoad harness did not produce one or more report files.\n"
            )
            raise SystemExit

          burst_report = json.loads(burst_path.read_text())
          hot_report = json.loads(hot_path.read_text())
          burst_sweeps = burst_report.get("sweeps", [])
          hot_sweeps = hot_report.get("sweeps", [])
          fresh_server_per_sweep = bool((burst_report.get("config") or {}).get("fresh_server_per_sweep"))

          def fmt(value, decimals=1):
            if value is None:
              return "n/a"
            return f"{value:.{decimals}f}"

          lines = ["## PR Load Test", "", "### Burst Sweep", ""]
          lines.extend([
            "| Games | Completed | Failed | Wall Time (s) | Throughput (games/s) | Action p95 (ms) | Action p99 (ms) | RSS Peak (MB) | RSS Delta End (MB) |",
            "|---:|---:|---:|---:|---:|---:|---:|---:|---:|",
          ])
          for s in burst_sweeps:
            action = s.get("action_latency_stats_ms") or {}
            rss_window = s.get("server_rss_window_mb") or {}
            lines.append(
              f"| {s.get('games', 0)} | {s.get('completed', 0)} | {s.get('failed', 0)} | "
              f"{fmt(s.get('wall_time_sec', 0.0), 2)} | {fmt(s.get('throughput_games_per_sec', 0.0), 3)} | "
              f"{fmt(action.get('p95', 0.0), 1)} | {fmt(action.get('p99', 0.0), 1)} | "
              f"{fmt(rss_window.get('peak', 0.0), 1)} | {fmt(rss_window.get('delta_end', 0.0), 1)} |"
            )

          lines.extend(["", "### Hot Residency Sweep", ""])
          lines.extend([
            "| Active Games | Idle Hot Games | Completed | Failed | Wall Time (s) | Throughput (games/s) | Action p95 (ms) | Preload RSS Delta (MB) | Active RSS Peak (MB) | Active RSS Delta (MB) |",
            "|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|",
          ])
          for s in hot_sweeps:
            action = s.get("action_latency_stats_ms") or {}
            preload_rss = s.get("preload_rss_window_mb") or {}
            active_rss = s.get("server_rss_window_mb") or {}
            lines.append(
              f"| {s.get('games', 0)} | {s.get('idle_hot_games', 0)} | {s.get('completed', 0)} | {s.get('failed', 0)} | "
              f"{fmt(s.get('wall_time_sec', 0.0), 2)} | {fmt(s.get('throughput_games_per_sec', 0.0), 3)} | "
              f"{fmt(action.get('p95', 0.0), 1)} | {fmt(preload_rss.get('delta_end', 0.0), 1)} | "
              f"{fmt(active_rss.get('peak', 0.0), 1)} | {fmt(active_rss.get('delta_end', 0.0), 1)} |"
            )

          lines.append("")
          if burst_sweeps:
            worst_burst = max((s.get("action_latency_stats_ms") or {}).get("p95", 0.0) for s in burst_sweeps)
            burst_peak = max((s.get("server_rss_window_mb") or {}).get("peak", 0.0) for s in burst_sweeps)
            lines.append(f"- Burst worst-case: `action p95={worst_burst:.1f} ms`, `rss peak={burst_peak:.1f} MB`.")
          if hot_sweeps:
            worst_hot = max((s.get("action_latency_stats_ms") or {}).get("p95", 0.0) for s in hot_sweeps)
            hot_peak = max((s.get("server_rss_window_mb") or {}).get("peak", 0.0) for s in hot_sweeps)
            hot_preload = max((s.get("preload_rss_window_mb") or {}).get("delta_end", 0.0) for s in hot_sweeps)
            lines.append(
              f"- Hot-residency worst-case: `action p95={worst_hot:.1f} ms`, `active rss peak={hot_peak:.1f} MB`, `preload rss delta={hot_preload:.1f} MB`."
            )
          lines.append("- Burst config: `--sweep 10,50,100,200 --puppet-count 3 --disable-caps --fresh-server-per-sweep --no-runtime-reset-between-sweeps --game-timeout-sec 900`")
          lines.append("- Hot config: `--games 50 --concurrency 50 --hot-sweep 0,100,250,500 --puppet-count 3 --disable-caps --fresh-server-per-sweep --no-runtime-reset-between-sweeps --game-timeout-sec 900`")
          if fresh_server_per_sweep:
            lines.append("- Sweep isolation: each sweep ran on a fresh managed server process and fresh DB copy.")
          else:
            reset_count = len(burst_report.get("runtime_resets", [])) + len(hot_report.get("runtime_resets", []))
            lines.append(f"- Runtime resets executed: `{reset_count}` (post-calibration, between sweeps, post-sweeps).")
          lines.append("- Guardrail: workflow fails if any sweep is not 100% completion with 0 failures.")
          lines.append("")
          lines.append("<sub>Automated comment from PR load-test workflow.</sub>")
          pathlib.Path("/tmp/pr-load-comment.md").write_text("\n".join(lines) + "\n")
          PY

      - name: Comment results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('/tmp/pr-load-comment.md', 'utf8')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })
