name: Deploy Main

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  announce-drain:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: https://magic-the-battling.fly.dev
      DELAY_MINUTES: "60"
    steps:
      - uses: actions/checkout@v4

      - name: Enter draining mode
        run: |
          SWITCH_AT_UTC=$(date -u -d "+${DELAY_MINUTES} minutes" "+%Y-%m-%d %H:%M UTC")
          export SWITCH_AT_UTC
          PAYLOAD=$(python - <<'PY'
          import json
          import os

          print(
              json.dumps(
                  {
                      "mode": "draining",
                      "message": (
                          f"Server update scheduled for {os.environ['SWITCH_AT_UTC']}. "
                          "New games are temporarily paused. "
                          "Tip: if you are currently in a game, you can reconnect and continue after the update."
                      ),
                      "updated_by": "github-actions-main",
                  }
              )
          )
          PY
          )
          RESPONSE_FILE=$(mktemp)
          STATUS_CODE=$(curl --show-error --silent \
            --output "${RESPONSE_FILE}" \
            --write-out "%{http_code}" \
            -X POST "${APP_BASE_URL}/api/ops/mode" \
            -H "Content-Type: application/json" \
            -H "x-ops-token: ${OPS_API_TOKEN}" \
            -d "${PAYLOAD}") || {
              echo "Failed to reach ops mode endpoint." >&2
              cat "${RESPONSE_FILE}" >&2 || true
              exit 1
            }

          if [ "${STATUS_CODE}" = "200" ]; then
            echo "Server entered draining mode."
            exit 0
          fi

          case "${STATUS_CODE}" in
            401|403|404|405|503)
              echo "Ops mode unavailable (HTTP ${STATUS_CODE}); continuing deploy without pre-drain."
              cat "${RESPONSE_FILE}" || true
              ;;
            *)
              echo "Unexpected status from ops mode endpoint: ${STATUS_CODE}" >&2
              cat "${RESPONSE_FILE}" >&2 || true
              exit 1
              ;;
          esac
        env:
          OPS_API_TOKEN: ${{ secrets.OPS_API_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: announce-drain
    env:
      APP_BASE_URL: https://magic-the-battling.fly.dev
      DELAY_SECONDS: "3600"
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Wait for scheduled deploy window
        run: sleep "${DELAY_SECONDS}"

      - name: Deploy app
        id: deploy_app
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Return to normal mode
        if: success()
        run: |
          RESPONSE_FILE=$(mktemp)
          STATUS_CODE=$(curl --show-error --silent \
            --output "${RESPONSE_FILE}" \
            --write-out "%{http_code}" \
            -X POST "${APP_BASE_URL}/api/ops/mode" \
            -H "Content-Type: application/json" \
            -H "x-ops-token: ${OPS_API_TOKEN}" \
            -d '{"mode":"normal","message":"", "updated_by":"github-actions-main"}') || {
              echo "Failed to reach ops mode endpoint." >&2
              cat "${RESPONSE_FILE}" >&2 || true
              exit 1
            }

          if [ "${STATUS_CODE}" = "200" ]; then
            echo "Server returned to normal mode."
            exit 0
          fi

          case "${STATUS_CODE}" in
            401|403|404|405|503)
              echo "Ops mode unavailable (HTTP ${STATUS_CODE}) after deploy; continuing."
              cat "${RESPONSE_FILE}" || true
              ;;
            *)
              echo "Unexpected status from ops mode endpoint: ${STATUS_CODE}" >&2
              cat "${RESPONSE_FILE}" >&2 || true
              exit 1
              ;;
          esac
        env:
          OPS_API_TOKEN: ${{ secrets.OPS_API_TOKEN }}

      - name: Switch to maintenance mode on deploy failure
        if: failure()
        run: |
          RESPONSE_FILE=$(mktemp)
          STATUS_CODE=$(curl --show-error --silent \
            --output "${RESPONSE_FILE}" \
            --write-out "%{http_code}" \
            -X POST "${APP_BASE_URL}/api/ops/mode" \
            -H "Content-Type: application/json" \
            -H "x-ops-token: ${OPS_API_TOKEN}" \
            -d '{"mode":"maintenance","message":"Deployment did not complete. Please retry in a few minutes.","updated_by":"github-actions-main"}') || {
              echo "Failed to reach ops mode endpoint." >&2
              cat "${RESPONSE_FILE}" >&2 || true
              exit 1
            }

          if [ "${STATUS_CODE}" = "200" ]; then
            echo "Server switched to maintenance mode."
            exit 0
          fi

          case "${STATUS_CODE}" in
            401|403|404|405|503)
              echo "Ops mode unavailable (HTTP ${STATUS_CODE}) on failed deploy; continuing."
              cat "${RESPONSE_FILE}" || true
              ;;
            *)
              echo "Unexpected status from ops mode endpoint: ${STATUS_CODE}" >&2
              cat "${RESPONSE_FILE}" >&2 || true
              exit 1
              ;;
          esac
        env:
          OPS_API_TOKEN: ${{ secrets.OPS_API_TOKEN }}

  release:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find merged PR and read release label
        id: pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --search "${{ github.sha }}" \
            --state merged \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No merged PR found for this commit; skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          BUMP=$(gh pr view "$PR_NUMBER" \
            --json labels \
            --jq '[.labels[].name | select(startswith("release:"))] | .[0] // empty' \
            | sed 's/^release://')

          if [ -z "$BUMP" ]; then
            echo "No release label on PR #${PR_NUMBER}; skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Will create a $BUMP release from PR #${PR_NUMBER}."

      - name: Get latest tag
        if: steps.pr_info.outputs.skip != 'true'
        id: get_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Calculate new version
        if: steps.pr_info.outputs.skip != 'true'
        id: calc_version
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "${{ steps.pr_info.outputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        if: steps.pr_info.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.calc_version.outputs.new_version }} \
            --title "${{ steps.calc_version.outputs.new_version }}" \
            --generate-notes
